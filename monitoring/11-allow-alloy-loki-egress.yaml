apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alloy-loki-egress
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: alloy
      app.kubernetes.io/name: alloy
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 10.90.90.32/32
    ports:
    - protocol: TCP
      port: 3100
