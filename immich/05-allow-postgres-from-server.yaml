apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-server
  namespace: immich
spec:
  podSelector:
    matchLabels:
      app: immich-postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: immich-server
    ports:
    - protocol: TCP
      port: 5432
