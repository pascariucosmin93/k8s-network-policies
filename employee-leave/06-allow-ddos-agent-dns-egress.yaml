apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ddos-agent-dns-egress
  namespace: employee-leave
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ddos-protection
      podSelector:
        matchLabels:
          app: ddos-agent
    ports:
    - protocol: TCP
      port: 8080
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
